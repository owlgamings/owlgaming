<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NEON DASH | ETHEREAL</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00f2ff; --secondary: #ff00de; --gold: #ffe600; --ghost: #ffffff; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #020205; color: white; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        
        /* New Splash Screen Styles */
        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 500;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1s ease-in-out;
        }
        .splash-title {
            font-family: 'Syncopate', sans-serif; font-size: 5rem; font-weight: 900;
            letter-spacing: 20px; color: var(--accent); text-shadow: 0 0 30px var(--accent);
            animation: glitch-intro 2.5s forwards; opacity: 0;
        }
        @keyframes glitch-intro {
            0% { opacity: 0; transform: scale(0.8); filter: hue-rotate(0deg); }
            20% { opacity: 1; transform: scale(1.1); filter: hue-rotate(90deg); text-shadow: 5px 0 red, -5px 0 blue; }
            40% { transform: scale(1); filter: hue-rotate(0deg); text-shadow: 0 0 30px var(--accent); }
            80% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-20px); }
        }

        #ui-layer {
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at center, #0a0a1a 0%, #000 100%); z-index: 100;
            transition: 0.8s cubic-bezier(0.87, 0, 0.13, 1);
            overflow: hidden; opacity: 0; /* Start hidden for splash */
        }

        #menu-bg-anim {
            position: absolute; inset: 0; pointer-events: none; z-index: -1; opacity: 0;
            transition: opacity 0.5s ease;
        }

        .main-frame {
            width: 90%; max-width: 1050px; display: flex; gap: 30px;
            padding: 50px; background: rgba(255,255,255,0.01);
            backdrop-filter: blur(50px); border: 1px solid rgba(0, 242, 255, 0.15); border-radius: 60px;
            box-shadow: 0 0 100px rgba(0,0,0,0.8);
            position: relative; z-index: 101;
        }

        .shop-panel { 
            flex: 1; 
            background: rgba(0,0,0,0.4); 
            border-radius: 30px; 
            padding: 25px; 
            border: 1px solid rgba(255,255,255,0.05);
            max-height: 450px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .nav-arrow {
            position: absolute; top: 20px; right: 25px;
            font-size: 24px; color: var(--accent); cursor: pointer;
            transition: 0.3s; z-index: 10;
        }
        .nav-arrow:hover { transform: scale(1.2); text-shadow: 0 0 10px var(--accent); }

        .shop-tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab-btn { flex: 1; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; border-radius: 10px; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: black; border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }

        #preview-box {
            width: 100%; height: 60px; background: rgba(0,0,0,0.6); border-radius: 15px; margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1); position: relative; overflow: hidden;
        }

        #scroll-area { overflow-y: auto; flex-grow: 1; padding-right: 5px; }
        #scroll-area::-webkit-scrollbar { width: 4px; }
        #scroll-area::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        .skin-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .skin-item { padding: 12px; border: 2px solid #222; border-radius: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .skin-item.owned { border-color: #444; }
        .skin-item.selected { background: rgba(0, 242, 255, 0.15); border-color: var(--accent); box-shadow: 0 0 20px var(--accent); }
        .skin-item.locked { opacity: 0.4; filter: grayscale(1); }
        .skin-preview { width: 30px; height: 30px; margin: 0 auto 8px; border: 2px solid white; box-shadow: 0 0 10px currentColor; position: relative; }

        .level-panel { flex: 1.5; text-align: center; }
        .star-count { font-size: 32px; color: var(--gold); margin-bottom: 15px; text-shadow: 0 0 20px rgba(255, 230, 0, 0.5); }
        
        .level-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .level-card {
            background: rgba(255,255,255,0.03); padding: 15px; border-radius: 20px;
            cursor: pointer; border: 1px solid rgba(255,255,255,0.05); transition: 0.4s;
        }
        .level-card:hover { background: rgba(0, 242, 255, 0.1); border-color: var(--accent); transform: translateX(10px); }
        .level-card.full-width { grid-column: span 2; }
        .level-card.special { border-color: var(--gold); background: rgba(255, 230, 0, 0.05); }

        #hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; z-index: 50; }
        .menu-btn { position: absolute; top: 25px; left: 25px; pointer-events: auto; background: rgba(0,0,0,0.6); border: 1px solid var(--accent); color: var(--accent); padding: 12px 25px; border-radius: 12px; cursor: pointer; font-weight: 900; }
        
        .progress-bar { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); width: 30%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; overflow: hidden; }
        #fill { width: 0%; height: 100%; background: var(--accent); box-shadow: 0 0 15px var(--accent); }
        
        #gotham-intro {
            position: fixed; inset: 0; background: black; display: flex; justify-content: center; align-items: center;
            z-index: 200; opacity: 0; pointer-events: none; transition: opacity 1.5s ease, transform 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045);
        }
        #gotham-intro h1 { font-family: 'Syncopate'; font-size: 4rem; color: #ffcc00; text-shadow: 0 0 30px #ffcc00; letter-spacing: 15px; }

        #spray-overlay {
            position: fixed; inset: 0; pointer-events: none; z-index: 300; display: none; background: transparent;
        }
        .paint-splat {
            position: absolute; background: #ff0000; border-radius: 50%;
            filter: blur(5px); opacity: 0; transform: scale(0);
        }
        .haha-splat {
            position: absolute; color: #00ff00; font-family: 'Syncopate'; font-weight: 900;
            font-size: 40px; opacity: 0; transform: scale(0); filter: blur(1px);
        }
        @keyframes spray {
            0% { transform: scale(0); opacity: 0; }
            30% { opacity: 0.9; }
            100% { transform: scale(3.5); opacity: 0.7; }
        }

        canvas { display: block; }
        .hidden { transform: translateY(-100%) scale(0.9); opacity: 0; pointer-events: none; }
        #music-content { display: none; height: 100%; flex-direction: column; }
        #menu-music-toggle { margin-bottom: 10px; background: rgba(0,0,0,0.6); border: 1px solid var(--secondary); color: var(--secondary); padding: 10px; border-radius: 10px; cursor: pointer; font-family: 'Orbitron'; font-size: 10px; width: 100%; font-weight: 900; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="splash-title">NEON DASH</div>
    </div>

    <div id="gotham-intro"><h1>WELCOME TO GOTHAM</h1></div>
    <div id="spray-overlay"></div>

    <div id="ui-layer">
        <canvas id="menu-bg-anim"></canvas>
        <div class="main-frame">
            <div class="shop-panel" id="side-panel">
                <div id="armory-content">
                    <div class="nav-arrow" onclick="toggleMusic(true)">➜</div>
                    <h2 style="font-size: 10px; letter-spacing: 4px; color: var(--accent); margin: 0 0 10px 0;">NEON ARMORY</h2>
                    <div id="preview-box"><canvas id="previewCanvas" style="width: 100%; height: 100%;"></canvas></div>
                    <div class="shop-tabs">
                        <button class="tab-btn active" onclick="switchTab('skins')">SKINS</button>
                        <button class="tab-btn" onclick="switchTab('trails')">TRAILS</button>
                    </div>
                    <div id="scroll-area"><div class="skin-list" id="shop-list"></div></div>
                </div>

                <div id="music-content">
                    <div class="nav-arrow" onclick="toggleMusic(false)">⬅</div>
                    <h2 style="font-size: 10px; letter-spacing: 4px; color: var(--secondary); margin: 0 0 15px 0;">MUSIC TERMINAL</h2>
                    <button id="menu-music-toggle" onclick="toggleInGameMusic()">MUSIC: ON</button>
                    <div id="music-status" style="flex-grow: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,0,0,0.3); border-radius: 20px; border: 1px dashed rgba(255,0,222,0.3); text-align: center; padding: 20px;">
                        <p id="now-playing" style="font-size: 10px; color: var(--secondary);">IDLE</p>
                    </div>
                </div>
            </div>

            <div class="level-panel">
                <div class="star-count">⭐ <span id="star-val">0</span></div>
                <h1 style="font-size: 3.5rem; margin: 0 0 20px;">ZENITH</h1>
                <div class="level-grid">
                    <div class="level-card" onmouseover="setMenuBg(1)" onmouseout="clearMenuBg()" onclick="startLevel(1)"><h3>STEREO</h3><p style="font-size:10px; opacity:0.6;">+10 ⭐</p></div>
                    <div class="level-card" onmouseover="setMenuBg(2)" onmouseout="clearMenuBg()" onclick="startLevel(2)"><h3>METRO</h3><p style="font-size:10px; opacity:0.6;">+25 ⭐</p></div>
                    <div class="level-card full-width" onmouseover="setMenuBg(3)" onmouseout="clearMenuBg()" onclick="startLevel(3)"><h3>ZENITH</h3><p style="font-size:10px; color:var(--secondary);">+50 ⭐ (FLAWLESS REWARD)</p></div>
                    <div class="level-card" onmouseover="setMenuBg(4)" onmouseout="clearMenuBg()" onclick="startLevel(4)"><h3>ORBITAL</h3><p style="font-size:10px; opacity:0.6;">+75 ⭐</p></div>
                    <div class="level-card special" onmouseover="setMenuBg(6)" onmouseout="clearMenuBg()" onclick="startLevel(6)"><h3>GOTHAM</h3><p style="font-size:10px; color:var(--gold);">UNLOCK VENGEANCE</p></div>
                    <div class="level-card" onmouseover="setMenuBg(5)" onmouseout="clearMenuBg()" onclick="startLevel(5)"><h3>VOID</h3><p style="font-size:10px; opacity:0.6;">+150 ⭐</p></div>
                    <div class="level-card" onmouseover="setMenuBg(7)" onmouseout="clearMenuBg()" onclick="startLevel(7)" style="border-color: #ff0000; background: rgba(255, 0, 0, 0.05);"><h3>NYC</h3><p style="font-size:10px; color:#00a2ff;">UNLOCK WEBSLINGER</p></div>
                </div>
            </div>
        </div>
    </div>

    <div id="hud">
        <button class="menu-btn" onclick="goToMenu()">TERMINATE</button>
        <div class="progress-bar"><div id="fill"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // Initialize Splash sequence
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('splash-screen').style.opacity = '0';
                document.getElementById('ui-layer').style.opacity = '1';
                setTimeout(() => {
                    document.getElementById('splash-screen').remove();
                }, 1000);
            }, 2600);
        });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const pCanvas = document.getElementById('previewCanvas');
        const pCtx = pCanvas.getContext('2d');
        const mCanvas = document.getElementById('menu-bg-anim');
        const mCtx = mCanvas.getContext('2d');
        const ui = document.getElementById('ui-layer');
        const fill = document.getElementById('fill');
        const sprayOverlay = document.getElementById('spray-overlay');
        const menuMusicBtn = document.getElementById('menu-music-toggle');
        const nowPlaying = document.getElementById('now-playing');
        const introPanel = document.getElementById('gotham-intro');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        mCanvas.width = window.innerWidth;
        mCanvas.height = window.innerHeight;
        pCanvas.width = 300; pCanvas.height = 60;

        let stars = parseInt(localStorage.getItem('zenStars')) || 0;
        let ownedSkins = JSON.parse(localStorage.getItem('zenSkins')) || [0];
        let ownedTrails = JSON.parse(localStorage.getItem('zenTrails')) || [0];
        let activeSkin = parseInt(localStorage.getItem('zenActive')) || 0;
        let activeTrail = parseInt(localStorage.getItem('zenActiveTrail')) || 0;
        let currentTab = 'skins';
        let previewNodes = [];
        let musicActive = true;
        let glitchFrame = 0;
        let hoverLevel = 0;

        let cityBuildings = [];
        let jokerBubbles = [];

        function setMenuBg(id) { hoverLevel = id; mCanvas.style.opacity = "0.6"; }
        function clearMenuBg() { hoverLevel = 0; mCanvas.style.opacity = "0"; }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let gothamBass = null, gothamDrone = null, beatLoop = null;

        function playLaugh() {
            if (!musicActive) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            glitchFrame = 10;
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(380 + Math.random() * 40, audioCtx.currentTime);
            osc1.frequency.exponentialRampToValueAtTime(120, audioCtx.currentTime + 0.5);
            gain1.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(850 + Math.random() * 200, audioCtx.currentTime);
            osc2.frequency.exponentialRampToValueAtTime(300, audioCtx.currentTime + 0.3);
            gain2.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc1.connect(gain1); gain1.connect(audioCtx.destination);
            osc2.connect(gain2); gain2.connect(audioCtx.destination);
            osc1.start(); osc1.stop(audioCtx.currentTime + 0.5);
            osc2.start(); osc2.stop(audioCtx.currentTime + 0.3);
        }

        function playGothamMusic() {
            if (!musicActive) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(1200, audioCtx.currentTime);
            filter.connect(audioCtx.destination);
            const master = audioCtx.createGain();
            master.gain.setValueAtTime(0.4, audioCtx.currentTime);
            master.connect(filter);
            gothamBass = audioCtx.createOscillator();
            const bassGain = audioCtx.createGain();
            gothamBass.type = 'triangle';
            gothamBass.frequency.setValueAtTime(40, audioCtx.currentTime);
            bassGain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gothamBass.connect(bassGain); bassGain.connect(master);
            gothamBass.start();
            gothamDrone = audioCtx.createOscillator();
            const droneGain = audioCtx.createGain();
            gothamDrone.type = 'sine';
            gothamDrone.frequency.setValueAtTime(100, audioCtx.currentTime);
            droneGain.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gothamDrone.connect(droneGain); droneGain.connect(master);
            gothamDrone.start();
            beatLoop = setInterval(() => {
                const kick = audioCtx.createOscillator();
                const kGain = audioCtx.createGain();
                kick.type = 'sine';
                kick.frequency.setValueAtTime(140, audioCtx.currentTime);
                kick.frequency.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                kGain.gain.setValueAtTime(0.35, audioCtx.currentTime);
                kGain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.12);
                kick.connect(kGain); kGain.connect(master);
                kick.start(); kick.stop(audioCtx.currentTime + 0.12);
            }, 480);
        }

        function stopAllMusic() {
            if (gothamBass) { gothamBass.stop(); gothamBass = null; }
            if (gothamDrone) { gothamDrone.stop(); gothamDrone = null; }
            if (beatLoop) { clearInterval(beatLoop); beatLoop = null; }
        }

        const skins = [
            { name: "Cyan", cost: 0, color: "#00f2ff", inner: "white" },
            { name: "Neon", cost: 25, color: "#ff00de", inner: "white" },
            { name: "Gold", cost: 100, color: "#ffe600", inner: "orange" },
            { name: "Ruby", cost: 250, color: "#ff2244", inner: "black" },
            { name: "Emerald", cost: 300, color: "#22ff66", inner: "white" },
            { name: "Cobalt", cost: 350, color: "#2244ff", inner: "cyan" },
            { name: "Amethyst", cost: 450, color: "#9900ff", inner: "white" },
            { name: "VoidStar", cost: 2000, color: "#050010", inner: "#ff00de" },
            { name: "Ghost", cost: 999, color: "#ffffff", inner: "#00f2ff", secret: true },
            { name: "Vengeance", cost: 0, color: "#1a1a1a", inner: "#ffcc00", secret: true, isBatman: true },
            { name: "Webslinger", cost: 0, color: "#ff0000", inner: "#0055ff", secret: true, isSpidey: true }
        ];

        const trails = [
            { name: "Classic", cost: 0, color: "rgba(255,255,255,0.4)" },
            { name: "Pulse", cost: 0, color: "#00f2ff" },
            { name: "Magma", cost: 0, color: "#ff4400" },
            { name: "Void", cost: 0, color: "#9900ff" },
            { name: "Rainbow", cost: 1000, color: "rainbow" },
            { name: "Bat-Swarm", cost: 0, color: "#000", isBatTrail: true }
        ];

        function toggleInGameMusic() {
            musicActive = !musicActive;
            if (musicActive) { menuMusicBtn.innerText = "MUSIC: ON"; menuMusicBtn.style.color = "var(--secondary)"; nowPlaying.innerText = "STANDBY"; }
            else { menuMusicBtn.innerText = "MUSIC: OFF"; menuMusicBtn.style.color = "#444"; nowPlaying.innerText = "TERMINATED"; stopAllMusic(); }
        }

        function toggleMusic(show) {
            document.getElementById('armory-content').style.display = show ? 'none' : 'block';
            document.getElementById('music-content').style.display = show ? 'flex' : 'none';
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(window.event) window.event.target.classList.add('active');
            updateShop();
        }

        function updateShop() {
            const list = document.getElementById('shop-list');
            document.getElementById('star-val').innerText = stars;
            list.innerHTML = '';
            const items = currentTab === 'skins' ? skins : trails;
            const owned = currentTab === 'skins' ? ownedSkins : ownedTrails;
            const active = currentTab === 'skins' ? activeSkin : activeTrail;

            items.forEach((s, i) => {
                const isOwned = owned.includes(i);
                if (s.secret && !isOwned) return; 
                const div = document.createElement('div');
                div.className = `skin-item ${isOwned ? 'owned' : 'locked'} ${active === i ? 'selected' : ''}`;
                let innerHTML = `<div style="font-size:9px">${isOwned ? s.name : '⭐'+s.cost}</div>`;
                
                if(currentTab === 'skins') { 
                    let batmanStyle = s.isBatman ? `
                        <div style="position:absolute; background:#1a1a1a; width:6px; height:8px; left:0; top:-6px;"></div>
                        <div style="position:absolute; background:#1a1a1a; width:6px; height:8px; right:0; top:-6px;"></div>
                        <div style="position:absolute; background:white; width:4px; height:2px; left:5px; top:6px;"></div>
                        <div style="position:absolute; background:white; width:4px; height:2px; right:5px; top:6px;"></div>
                    ` : '';
                    let spideyStyle = s.isSpidey ? `
                        <div style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; border: 1px solid rgba(0,0,0,0.2);"></div>
                        <div style="position:absolute; background:white; border: 1px solid black; border-radius:50%; width:6px; height:9px; left:6px; top:10px; transform:rotate(-20deg);"></div>
                        <div style="position:absolute; background:white; border: 1px solid black; border-radius:50%; width:6px; height:9px; right:6px; top:10px; transform:rotate(20deg);"></div>
                    ` : '';
                    div.innerHTML = `<div class="skin-preview" style="background:${s.color}; border-color:${s.inner}">${batmanStyle}${spideyStyle}</div>` + innerHTML; 
                }
                else { 
                    let trailStyle = s.isBatTrail ? "color: white; font-size: 15px; margin-bottom: 5px;" : `height:10px; width:40px; border-radius:5px; margin: 10px auto; background:${s.color === 'rainbow' ? 'linear-gradient(to right, red, purple, blue)' : s.color}`;
                    div.innerHTML = `<div style="${trailStyle}">${s.isBatTrail ? '🦇' : ''}</div>` + innerHTML; 
                }
                div.onclick = () => {
                    if (s.isBatTrail && !skins[activeSkin].isBatman) { alert("UNLOCK VENGEANCE FIRST"); return; }
                    if(isOwned) { if(currentTab === 'skins') { activeSkin = i; if(trails[activeTrail].isBatTrail && !skins[i].isBatman) activeTrail = 0; } else activeTrail = i; }
                    else if(stars >= s.cost) { stars -= s.cost; owned.push(i); if(currentTab === 'skins') activeSkin = i; else activeTrail = i; }
                    saveData(); updateShop();
                };
                list.appendChild(div);
            });
        }

        function saveData() {
            localStorage.setItem('zenStars', stars);
            localStorage.setItem('zenSkins', JSON.stringify(ownedSkins));
            localStorage.setItem('zenTrails', JSON.stringify(ownedTrails));
            localStorage.setItem('zenActive', activeSkin);
            localStorage.setItem('zenActiveTrail', activeTrail);
        }

        function drawBat(ctx, x, y, size) {
            let flap = Math.sin(Date.now() / 60) * 10;
            ctx.fillStyle = "black";
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.quadraticCurveTo(x - size, y - size + flap, x - size * 2, y);
            ctx.quadraticCurveTo(x - size, y + size/2, x, y + size/2);
            ctx.quadraticCurveTo(x + size, y + size/2, x + size * 2, y);
            ctx.quadraticCurveTo(x + size, y - size + flap, x, y);
            ctx.fill();
        }

        function drawPreview() {
            pCtx.clearRect(0,0,300,60);
            const t = trails[activeTrail];
            const px = 250, py = 30 + Math.sin(Date.now()/200)*10;
            previewNodes.unshift({x: px, y: py});
            if(previewNodes.length > 20) previewNodes.pop();
            
            if(t.isBatTrail) {
                previewNodes.forEach((n, i) => { if(i % 5 === 0) drawBat(pCtx, n.x - (i * 8), n.y + Math.sin(i)*5, 6); });
            } else {
                pCtx.beginPath(); pCtx.lineWidth = 8; pCtx.lineCap = "round";
                previewNodes.forEach((n, i) => {
                    pCtx.lineTo(n.x - (i * 8), n.y);
                    pCtx.strokeStyle = t.color === 'rainbow' ? `hsl(${Date.now()/10 + i*20}, 100%, 50%)` : t.color;
                    pCtx.globalAlpha = 1 - (i/previewNodes.length);
                });
                pCtx.stroke(); pCtx.globalAlpha = 1;
            }
            const s = skins[activeSkin];
            pCtx.fillStyle = s.color; pCtx.save(); pCtx.translate(px, py);
            pCtx.fillRect(-15, -15, 30, 30);
            
            if(s.isSpidey) {
                pCtx.strokeStyle = "rgba(0,0,0,0.5)"; pCtx.lineWidth = 1;
                pCtx.beginPath();
                for(let i=0; i<3; i++) {
                    pCtx.moveTo(-15, -15 + i*10); pCtx.lineTo(15, -15 + i*10);
                    pCtx.moveTo(-15 + i*10, -15); pCtx.lineTo(-15 + i*10, 15);
                }
                pCtx.stroke();
                pCtx.fillStyle = "white"; pCtx.strokeStyle = "black"; pCtx.lineWidth = 1;
                pCtx.beginPath(); pCtx.ellipse(-7, -4, 5, 8, -0.4, 0, Math.PI*2); pCtx.fill(); pCtx.stroke();
                pCtx.beginPath(); pCtx.ellipse(7, -4, 5, 8, 0.4, 0, Math.PI*2); pCtx.fill(); pCtx.stroke();
            }

            if(s.isBatman) {
                pCtx.fillStyle = "#1a1a1a"; pCtx.fillRect(-15, -22, 6, 7); pCtx.fillRect(9, -22, 6, 7);
                pCtx.fillStyle = "white"; pCtx.fillRect(-10, -6, 5, 3); pCtx.fillRect(5, -6, 5, 3);
            }
            pCtx.restore();
            requestAnimationFrame(drawPreview);
        }

        function drawMenuBg() {
            mCtx.clearRect(0,0,mCanvas.width,mCanvas.height);
            if(hoverLevel === 0) return requestAnimationFrame(drawMenuBg);

            mCtx.globalAlpha = 0.5;
            if(hoverLevel === 1) { 
                mCtx.fillStyle = "white";
                for(let i=0; i<100; i++) { mCtx.fillRect((i*50 + Date.now()/10)%mCanvas.width, (i*80)%mCanvas.height, 2, 2); }
            } else if(hoverLevel === 2) { 
                mCtx.strokeStyle = "#00f2ff"; mCtx.lineWidth = 1;
                for(let i=0; i<20; i++) { mCtx.beginPath(); mCtx.moveTo(0, (i*60 + Date.now()/5)%mCanvas.height); mCtx.lineTo(mCanvas.width, (i*60 + Date.now()/5)%mCanvas.height); mCtx.stroke(); }
            } else if(hoverLevel === 6) { 
                mCtx.strokeStyle = "rgba(255,255,255,0.2)"; mCtx.lineWidth = 1;
                for(let i=0; i<100; i++) { let x = (i*25)%mCanvas.width; let y = (i*100 + Date.now())%mCanvas.height; mCtx.beginPath(); mCtx.moveTo(x, y); mCtx.lineTo(x-5, y+15); mCtx.stroke(); }
            } else if(hoverLevel === 7) { 
                mCtx.fillStyle = Date.now() % 1000 > 500 ? "rgba(255,0,0,0.05)" : "rgba(0,0,255,0.05)";
                mCtx.fillRect(0,0,mCanvas.width,mCanvas.height);
            } else { 
                let pulse = Math.sin(Date.now()/500) * 0.1;
                mCtx.fillStyle = `rgba(255,0,222, ${0.1 + pulse})`;
                mCtx.fillRect(0,0,mCanvas.width,mCanvas.height);
            }
            requestAnimationFrame(drawMenuBg);
        }

        let isPlaying = false, isDead = false, dist = 0, target = 0, levelId = 1;
        let obstacles = [], particles = [], trailNodes = [];
        const player = { x: 250, y: 0, size: 42, dy: 0, grav: 0.8, jump: -15, rot: 0, ground: false, opacity: 1 };

        function startLevel(id) {
            levelId = id; 
            if (id === 7) { 
                const intro = document.getElementById('gotham-intro');
                intro.style.background = "#87CEEB"; 
                intro.querySelector('h1').innerText = "NYC";
                intro.querySelector('h1').style.color = "white";
                intro.querySelector('h1').style.textShadow = "0 0 30px #ff0000";
                intro.style.opacity = '1';
                cityBuildings = [];
                for(let i=0; i<40; i++) { cityBuildings.push({ x: i * 220, w: 100 + Math.random() * 120, h: 350 + Math.random() * 350, windows: Array.from({length: 25}, () => Math.random() > 0.4) }); }
                setTimeout(() => {
                    intro.style.transition = "transform 0.6s cubic-bezier(0.6, -0.28, 0.735, 0.045)";
                    intro.style.transform = "translateY(-100%)";
                    setTimeout(() => {
                        intro.style.opacity = '0';
                        intro.style.transform = "translateY(0)";
                        intro.style.transition = "opacity 1.5s ease";
                        initLevel(id);
                    }, 600);
                }, 1500);
            } else if (id === 6) {
                playGothamMusic();
                nowPlaying.innerText = "GOTHAM: HAHA";
                const intro = document.getElementById('gotham-intro');
                intro.style.background = "black";
                intro.querySelector('h1').innerText = "WELCOME TO GOTHAM";
                intro.querySelector('h1').style.color = "#ffcc00";
                intro.querySelector('h1').style.textShadow = "0 0 30px #ffcc00";
                intro.style.opacity = '1';
                cityBuildings = [];
                for(let i=0; i<30; i++) { cityBuildings.push({ x: i * 200, w: 120 + Math.random() * 80, h: 200 + Math.random() * 300, windows: Array.from({length: 15}, () => Math.random() > 0.6) }); }
                setTimeout(() => { intro.style.opacity = '0'; initLevel(id); }, 2000);
            } else { initLevel(id); }
        }

        function initLevel(id) {
            ui.classList.add('hidden');
            document.getElementById('hud').style.display = 'block';
            target = 30000 + (id * 25000); obstacles = []; isPlaying = true; isDead = false; dist = 0; trailNodes = [];
            jokerBubbles = [];
            let baseSpacing = (id === 6 || id === 7) ? 1100 : 850 - (id * 50); 
            for (let i = 1500; i < target; i += baseSpacing) {
                let chance = (id === 6 || id === 7) ? 0.3 : 0.4; 
                if (Math.random() > chance) { obstacles.push({ x: i, y: 0, w: 45, h: 45, type: 'block' }); if((id !== 6 && id !== 7) || Math.random() > 0.7) obstacles.push({ x: i+45, y: 45, w: 150, h: 45, type: 'block' }); } 
                else obstacles.push({ x: i, y: 0, w: 45, h: 45, type: 'spike' });
                
                if (id === 6 && i > target * 0.5) {
                    if (Math.random() > 0.5) obstacles.push({ x: i + 400, y: 0, w: 30, h: 50, type: 'spraycan', roll: 0 });
                }
                if(id === 6 || id === 7) i += 200; 
            }
            obstacles.push({ x: target + 600, type: 'end', w: 60, h: 1000, y: 0 });
        }

        function triggerDeath() {
            if (isDead) return;
            isDead = true; player.opacity = 0;
            const s = skins[activeSkin];
            if (levelId === 6) {
                playLaugh();
                sprayOverlay.style.display = 'block';
                sprayOverlay.innerHTML = '';
                for(let i=0; i<35; i++) {
                    let p = document.createElement('div'); p.className = 'paint-splat';
                    let size = 60 + Math.random() * 180; p.style.width = size + 'px'; p.style.height = size + 'px';
                    p.style.left = Math.random() * 100 + '%'; p.style.top = Math.random() * 100 + '%';
                    p.style.animation = `spray 0.7s forwards ${Math.random() * 0.3}s`; sprayOverlay.appendChild(p);
                }
                for(let i=0; i<15; i++) {
                    let h = document.createElement('div'); h.className = 'haha-splat'; h.innerText = "HAHA";
                    h.style.left = Math.random() * 80 + '%'; h.style.top = Math.random() * 80 + '%';
                    h.style.transform = `rotate(${(Math.random()-0.5)*60}deg)`;
                    h.style.animation = `spray 0.8s forwards ${0.4 + Math.random() * 0.4}s`; sprayOverlay.appendChild(h);
                }
                setTimeout(() => { sprayOverlay.style.display = 'none'; respawn(); }, 1400);
            } else {
                for (let i = 0; i < 20; i++) particles.push({ x: player.x+21, y: player.y+21, vx: (Math.random()-0.5)*18, vy: (Math.random()-0.5)*18, life: 1, color: s.name === "Ruby" ? "#ff2244" : "rgba(255, 255, 255, ", isRuby: s.name === "Ruby" });
                setTimeout(respawn, 850);
            }
        }

        function respawn() { dist = 0; player.y = 0; player.dy = 0; player.opacity = 1; player.rot = 0; isDead = false; particles = []; trailNodes = []; jokerBubbles = []; }

        function win() {
            stars += (levelId === 6 || levelId === 7) ? 200 : [0, 10, 25, 50, 75, 150][levelId];
            if (levelId === 6) { 
                const batmanIdx = skins.findIndex(s => s.name === "Vengeance"); 
                if (!ownedSkins.includes(batmanIdx)) { ownedSkins.push(batmanIdx); alert("THE NIGHT IS YOURS: VENGEANCE UNLOCKED"); } 
            }
            if (levelId === 7) { 
                const spideyIdx = skins.findIndex(s => s.name === "Webslinger"); 
                if (!ownedSkins.includes(spideyIdx)) { ownedSkins.push(spideyIdx); alert("GREATER RESPONSIBILITY: WEBSLINGER UNLOCKED"); } 
            }
            saveData(); updateShop(); goToMenu();
        }

        function goToMenu() { isPlaying = false; stopAllMusic(); nowPlaying.innerText = "IDLE"; ui.classList.remove('hidden'); document.getElementById('hud').style.display = 'none'; clearMenuBg(); }

        function render() {
            ctx.save();
            if(glitchFrame > 0) { ctx.translate((Math.random()-0.5)*10, (Math.random()-0.5)*10); glitchFrame--; }
            let grd = ctx.createRadialGradient(canvas.width/2, canvas.height/2, 0, canvas.width/2, canvas.height/2, canvas.width);
            const levelColors = ['#0a0a20', '#150515', '#1a0505', '#002626', '#14001f', '#050505', '#87CEEB'];
            grd.addColorStop(0, levelColors[levelId-1] || '#000'); grd.addColorStop(1, '#000000');
            ctx.fillStyle = grd; ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            const groundY = canvas.height - 150;

            if ((levelId === 6 || levelId === 7) && isPlaying) {
                cityBuildings.forEach((b, idx) => {
                    let bx = (b.x - dist * 0.5) % (cityBuildings.length * 200); if (bx < -300) bx += cityBuildings.length * 200;
                    ctx.fillStyle = levelId === 6 ? "#0a0a0c" : "#2c3e50"; 
                    ctx.fillRect(bx, groundY - b.h, b.w, b.h); 
                    
                    ctx.fillStyle = levelId === 6 ? "#ffcc00" : "#ffffff";
                    b.windows.forEach((on, wi) => { 
                        if(on) { 
                            let wx = bx + 15 + (wi % 3) * 35; 
                            let wy = (groundY - b.h + 20) + Math.floor(wi / 3) * 45; 
                            ctx.globalAlpha = levelId === 6 ? (0.4 + Math.sin(Date.now()/500 + idx) * 0.2) : 0.8; 
                            ctx.fillRect(wx, wy, 15, 20); 
                        } 
                    });
                    ctx.globalAlpha = 1;
                });
            }

            ctx.fillStyle = "white";
            for(let i=0; i<50; i++) { let sx = (Math.sin(i) * 10000 - dist * (0.1 + i*0.01)) % canvas.width; if(sx < 0) sx += canvas.width; ctx.globalAlpha = 0.3; ctx.beginPath(); ctx.arc(sx, (i*23)%canvas.height, 1, 0, 7); ctx.fill(); }
            ctx.globalAlpha = 1.0;

            ctx.fillStyle = "#050508"; ctx.fillRect(0, groundY, canvas.width, 150);
            
            if (isPlaying && !isDead) {
                dist += (11 + levelId); fill.style.width = (dist / target * 100) + "%";
                player.dy += player.grav; player.y += player.dy;
                
                if (!player.ground) {
                    player.rot += 0.15;
                }

                let floor = groundY; player.ground = false;
                
                if (levelId === 6 && (dist / target) > 0.5) { if (Math.random() > 0.965) { jokerBubbles.push({ x: canvas.width + 50, y: 100 + Math.random() * 400, txt: "HAHA", size: 25 + Math.random() * 45, rot: (Math.random()-0.5) }); playLaugh(); } }
                
                trailNodes.unshift({x: player.x + 21, y: player.y + 21}); if(trailNodes.length > 20) trailNodes.pop();
                const t = trails[activeTrail]; const s = skins[activeSkin];
                
                if(t.isBatTrail) { 
                    trailNodes.forEach((n, i) => { 
                        if(i % 4 === 0) {
                            let jumpOffset = player.dy < 0 ? player.dy * i * 0.5 : 0;
                            drawBat(ctx, n.x - (i * 2), n.y + Math.sin(i + Date.now()/100)*10 + jumpOffset, 8); 
                        }
                    }); 
                }
                else {
                    ctx.beginPath(); ctx.lineWidth = 14; ctx.lineCap = "round";
                    trailNodes.forEach((n, i) => { ctx.lineTo(n.x - (i * 2), n.y); ctx.strokeStyle = s.isBatman ? (i % 2 === 0 ? "#ffcc00" : "#1a1a1a") : (t.color === 'rainbow' ? `hsl(${Date.now()/10 + i*20}, 100%, 50%)` : t.color); ctx.globalAlpha = 1 - (i/trailNodes.length); });
                    ctx.stroke(); ctx.globalAlpha = 1;
                }

                obstacles.forEach(ob => {
                    let scrollSpeed = (ob.type === 'spraycan') ? dist * 1.3 : dist;
                    let rx = ob.x - scrollSpeed + player.x, ry = groundY - ob.y - ob.h;
                    
                    if (player.x < rx + ob.w && player.x + player.size > rx && player.y < ry + ob.h && player.y + player.size > ry) { if (ob.type === 'end') win(); else if (ob.type === 'spike' || ob.type === 'spraycan') triggerDeath(); else if (ob.type === 'block') { if (player.y + player.size <= ry + 25 && player.dy >= 0) floor = ry; else triggerDeath(); } }
                    
                    if (ob.type === 'spike') { ctx.fillStyle = "#ff2244"; ctx.beginPath(); ctx.moveTo(rx, groundY - ob.y); ctx.lineTo(rx + 22, groundY - ob.y - 45); ctx.lineTo(rx + 45, groundY - ob.y); ctx.fill(); }
                    else if (ob.type === 'block') { ctx.fillStyle = "#000"; ctx.strokeStyle = "white"; ctx.fillRect(rx, ry, ob.w, ob.h); ctx.strokeRect(rx, ry, ob.w, ob.h); }
                    else if (ob.type === 'spraycan') {
                        if (Math.random() > 0.8) particles.push({ x: rx + 15, y: groundY - 10, vx: -2 - Math.random() * 2, vy: -Math.random() * 2, life: 0.6, color: "rgba(0, 255, 0, ", isGas: true });
                        ob.roll += 0.2; ctx.save(); ctx.translate(rx + 15, ry + 25); ctx.rotate(ob.roll);
                        ctx.fillStyle = "#ddd"; ctx.fillRect(-10, -20, 20, 40); ctx.fillStyle = "#ff0000"; ctx.fillRect(-10, -5, 20, 10);
                        ctx.fillStyle = "#333"; ctx.fillRect(-4, -25, 8, 5); ctx.restore();
                    }
                });
                if (player.y + player.size > floor) { player.y = floor - player.size; player.dy = 0; player.ground = true; }
            }

            jokerBubbles.forEach((b, i) => { b.x -= 8; ctx.save(); ctx.translate(b.x, b.y); ctx.rotate(b.rot); ctx.font = `bold ${b.size}px "Syncopate"`; ctx.fillStyle = "#00ff00"; ctx.fillText(b.txt, 0, 0); ctx.restore(); if(b.x < -100) jokerBubbles.splice(i, 1); });
            particles.forEach((p, i) => { p.x += p.vx; p.y += p.vy; p.life -= 0.025; ctx.fillStyle = p.isRuby ? `rgba(255, 34, 68, ${p.life})` : (p.isGas ? p.color + p.life + ")" : p.color + p.life + ")"); ctx.fillRect(p.x, p.y, p.isGas ? 8 : 5, p.isGas ? 8 : 5); if(p.life <= 0) particles.splice(i, 1); });

            if (isPlaying) {
                const s = skins[activeSkin];
                ctx.globalAlpha = player.opacity;
                ctx.fillStyle = s.color;
                ctx.save();
                ctx.translate(player.x + player.size/2, player.y + player.size/2);
                ctx.rotate(player.rot);
                ctx.fillRect(-player.size/2, -player.size/2, player.size, player.size);
                
                if(s.isSpidey) {
                    ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 1;
                    ctx.beginPath();
                    for(let i=0; i<4; i++) {
                        ctx.moveTo(-player.size/2, -player.size/2 + i*14); ctx.lineTo(player.size/2, -player.size/2 + i*14);
                        ctx.moveTo(-player.size/2 + i*14, -player.size/2); ctx.lineTo(-player.size/2 + i*14, player.size/2);
                    }
                    ctx.stroke();

                    let eyeSquint = player.dy < 0 ? Math.min(6, Math.abs(player.dy / 2)) : 0;
                    ctx.fillStyle = "white"; ctx.strokeStyle = "black"; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.ellipse(-10, -5, 7, 12 - eyeSquint, -0.4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                    ctx.beginPath(); ctx.ellipse(10, -5, 7, 12 - eyeSquint, 0.4, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                }

                if(s.isBatman) {
                    ctx.fillStyle = "#1a1a1a"; ctx.fillRect(-player.size/2, -player.size/2 - 10, 8, 10); ctx.fillRect(player.size/2 - 8, -player.size/2 - 10, 8, 10);
                    ctx.fillStyle = "white"; ctx.fillRect(-player.size/2 + 8, -player.size/2 + 12, 6, 4); ctx.fillRect(player.size/2 - 14, -player.size/2 + 12, 6, 4);
                }
                ctx.restore();
                ctx.globalAlpha = 1;
            }

            requestAnimationFrame(render);
        }

        window.addEventListener('keydown', e => { 
            if ((e.code === 'Space' || e.key === 'ArrowUp') && player.ground && isPlaying && !isDead) { 
                player.dy = player.jump; 
            } 
        });
        window.addEventListener('mousedown', () => { 
            if (player.ground && isPlaying && !isDead) {
                player.dy = player.jump; 
            }
        });

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            mCanvas.width = window.innerWidth; mCanvas.height = window.innerHeight;
        });

        updateShop(); drawPreview(); drawMenuBg(); render();
    </script>
</body>
</html>
